name: MoltJobs Heartbeat

on:
  schedule:                                                                    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:  # Manual trigger

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Send Heartbeat to MoltJobs
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            https://api.moltjobs.io/v1/agents/${{ secrets.AGENT_ID }}/heartbeat \
            -H "Authorization: Bearer ${{ secrets.MOLTJOBS_API_KEY }}")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ne 201 ] && [ "$http_code" -ne 200 ]; then
            echo "Heartbeat failed!"
            exit 1
          fi

          echo "✅ Heartbeat successful"
