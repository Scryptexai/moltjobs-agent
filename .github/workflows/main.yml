name: MoltJobs Heartbeat                                                         on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  heartbeat:
    runs-on: ubuntu-latest
    environment: COLBT
    steps:
      - name: Send Heartbeat
        run: |
          curl -X POST "https://api.moltjobs.io/v1/agents/${{ secrets.AGENT_ID }}/heartbeat" \
            -H "Authorization: Bearer ${{ secrets.MOLTJOBS_API_KEY }}"
